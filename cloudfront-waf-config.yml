AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFormation template for the Pack app website with CloudFront and WAF"

Parameters:
  DomainName:
    Type: String
    Description: The domain name for the app website (e.g. www.trypackai.com)
    Default: www.trypackai.com

  S3BucketName:
    Type: String
    Description: S3 bucket name for website content
    Default: pack-website-content

  OpsAlarmTopicArn:
    Type: String
    Description: Optional SNS topic ARN for website CloudWatch alarm notifications
    Default: ""

Conditions:
  HasOpsAlarmTopic: !Not [!Equals [!Ref OpsAlarmTopicArn, ""]]

Resources:
  # S3 bucket for website content
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  # S3 bucket policy allows CloudFront OAI access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: "s3:GetObject"
            Resource: !Sub "${WebsiteBucket.Arn}/*"

  # CloudFront Origin Access Identity
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "Origin Access Identity for ${DomainName}"

  # Main WAF WebACL
  WAFWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: PackAppWebACL
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: PackWebsiteACL
      Rules:
        - Name: RateLimitPerIp
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitPerIp
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesAmazonIpReputationList
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet

  # CloudFront distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        WebACLId: !GetAtt WAFWebACL.Arn
        ViewerCertificate:
          AcmCertificateArn: !Sub "arn:aws:acm:us-east-1:${AWS::AccountId}:certificate/a3c2356c-2cd4-4c0e-94ed-acd72c1ec364"
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt CanonicalHostRedirectFunction.FunctionARN
            - EventType: viewer-response
              FunctionARN: !GetAtt SecurityHeadersFunction.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  CanonicalHostRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: CanonicalHostRedirectFunction
      AutoPublish: true
      FunctionConfig:
        Comment: Redirect apex traffic and normalize canonical marketing URLs
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function serializeQueryString(querystring) {
          var pairs = [];
          for (var key in querystring) {
            if (!Object.prototype.hasOwnProperty.call(querystring, key)) {
              continue;
            }
            var entry = querystring[key];
            if (entry.multiValue && entry.multiValue.length > 0) {
              for (var index = 0; index < entry.multiValue.length; index++) {
                var item = entry.multiValue[index];
                pairs.push(item.value ? key + '=' + item.value : key);
              }
              continue;
            }
            pairs.push(entry.value ? key + '=' + entry.value : key);
          }
          return pairs.length > 0 ? '?' + pairs.join('&') : '';
        }

        function hasFileExtension(uri) {
          return /\.[a-zA-Z0-9]+$/.test(uri);
        }

        function isAppShellRoute(uri) {
          return uri === '/app' || uri.indexOf('/app/') === 0;
        }

        function canonicalizeUri(uri) {
          if (uri === '/') {
            return '/';
          }
          return uri.endsWith('/') ? uri.slice(0, -1) : uri;
        }

        function handler(event) {
          var request = event.request;
          var hostHeader = request.headers.host || {};
          var host = hostHeader.value || '';
          var uri = request.uri || '/';
          var querySuffix = serializeQueryString(request.querystring || {});
          var canonicalUri = canonicalizeUri(uri);

          if (host === 'trypackai.com') {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: {
                location: {
                  value: 'https://www.trypackai.com' + canonicalUri + querySuffix,
                },
                'cache-control': {
                  value: 'public, max-age=300',
                },
              },
            };
          }

          if (host === 'app.trypackai.com') {
            var canonicalAppPath = canonicalUri === '/' ? '/app' : canonicalUri;
            return {
              statusCode: 302,
              statusDescription: 'Found',
              headers: {
                location: {
                  value: 'https://www.trypackai.com' + canonicalAppPath + querySuffix,
                },
                'cache-control': {
                  value: 'public, max-age=300',
                },
              },
            };
          }

          if (uri !== canonicalUri) {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: {
                location: {
                  value: 'https://www.trypackai.com' + canonicalUri + querySuffix,
                },
                'cache-control': {
                  value: 'public, max-age=300',
                },
              },
            };
          }

          if (uri === '/') {
            request.uri = '/index.html';
            return request;
          }

          if (hasFileExtension(uri) || isAppShellRoute(uri)) {
            return request;
          }

          request.uri = uri + '/index.html';
          return request;
        }

  SecurityHeadersFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: SecurityHeadersFunction
      AutoPublish: true
      FunctionConfig:
        Comment: Adds security headers to responses
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var response = event.response;
          var headers = response.headers;
          var contentSecurityPolicy = "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self' https://www.facebook.com; frame-ancestors 'none'; upgrade-insecure-requests; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://www.googletagmanager.com https://connect.facebook.net https://analytics.tiktok.com; script-src-elem 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://www.googletagmanager.com https://connect.facebook.net https://analytics.tiktok.com; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://api.trypackai.com https://78o58odzab.execute-api.us-east-1.amazonaws.com https://auth.trypackai.com https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://www.facebook.com https://www.google.com https://www.recaptcha.net https://sentry.avs.io https://tsa-board.trypackai.com https://*.cloudfront.net https://nominatim.openstreetmap.org https://analytics.tiktok.com; frame-src 'self' https://www.google.com/recaptcha/ https://www.recaptcha.net/recaptcha/ https://www.googletagmanager.com https://www.facebook.com; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self'; manifest-src 'self'; media-src 'self' https:;";

          headers['strict-transport-security'] = { value: 'max-age=63072000; includeSubDomains; preload' };
          headers['content-security-policy'] = { value: contentSecurityPolicy };
          headers['x-content-type-options'] = { value: 'nosniff' };
          headers['x-frame-options'] = { value: 'DENY' };
          headers['x-xss-protection'] = { value: '0' };
          headers['x-permitted-cross-domain-policies'] = { value: 'none' };
          headers['x-download-options'] = { value: 'noopen' };
          headers['cross-origin-opener-policy'] = { value: 'same-origin' };
          headers['cross-origin-resource-policy'] = { value: 'same-origin' };
          headers['origin-agent-cluster'] = { value: '?1' };
          headers['referrer-policy'] = { value: 'strict-origin-when-cross-origin' };
          headers['permissions-policy'] = { value: 'camera=(), geolocation=(), microphone=(), payment=(), usb=()' };

          return response;
        }

  WebsiteCloudFront5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${DomainName}-cloudfront-5xx-rate"
      AlarmDescription: !Sub "CloudFront 5xx error rate is elevated for ${DomainName}"
      Namespace: AWS/CloudFront
      MetricName: 5xxErrorRate
      Dimensions:
        - Name: DistributionId
          Value: !Ref CloudFrontDistribution
        - Name: Region
          Value: Global
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        !If [HasOpsAlarmTopic, [!Ref OpsAlarmTopicArn], !Ref AWS::NoValue]

  WebsiteWafBlockedRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${DomainName}-waf-blocked-requests"
      AlarmDescription: !Sub "WAF blocked requests are elevated for ${DomainName}"
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: PackAppWebACL
        - Name: Region
          Value: Global
        - Name: Rule
          Value: ALL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        !If [HasOpsAlarmTopic, [!Ref OpsAlarmTopicArn], !Ref AWS::NoValue]

Outputs:
  CloudFrontURL:
    Description: URL of the CloudFront distribution
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  WebACLArn:
    Description: ARN of the Web ACL
    Value: !GetAtt WAFWebACL.Arn
