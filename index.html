    <script>
      ((location) => {
        if (
          location.hostname === "itsdoneai.com" ||
          location.hostname === "www.itsdoneai.com"
        ) {
          const legacyRedirectUrl = new URL(location.href);
          legacyRedirectUrl.hostname = "www.trypackai.com";
          window.location.replace(legacyRedirectUrl.toString());
          return;
        }
        if (location.hostname === "trypackai.com") {
          const canonicalUrl = new URL(location.href);
          canonicalUrl.hostname = "www.trypackai.com";
          window.location.replace(canonicalUrl.toString());
        }
      })(window.location);
    </script>
    <script>
      // Single Page Apps for GitHub Pages (inline to avoid render-blocking request)
      // MIT License - Adapted from https://github.com/rafgraph/spa-github-pages
      ((location) => {
        if (location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map((segment) => segment.replace(/~and~/g, "&"))
            .join("?");
          window.history.replaceState(
            null,
            "",
            location.pathname.slice(0, -1) + decoded + location.hash
          );
        }
      })(window.location);
    </script>
