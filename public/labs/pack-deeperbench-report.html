  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --line: #d8dee8;
      --text: #18202a;
      --muted: #5f6b7a;
      --bad: #b42318;
      --ok: #067647;
      --warn: #b54708;
      --accent: #2457c5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 3;
    }
    h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: 0; }
    h2 { margin: 24px 0 10px; font-size: 18px; letter-spacing: 0; }
    h3 { margin: 0 0 8px; font-size: 15px; letter-spacing: 0; }
    main { padding: 20px 28px 40px; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .ok { color: var(--ok); }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
      align-items: center;
    }
    input, select, button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }
    button { cursor: pointer; }
    button.active { border-color: var(--accent); color: var(--accent); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); }
    th, td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; vertical-align: top; }
    th { position: sticky; top: 82px; background: #eef2f7; z-index: 2; font-size: 12px; color: #344054; }
    tr:hover td { background: #f4f7fb; }
    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      margin: 1px;
      font-size: 12px;
      color: #344054;
      background: #f8fafc;
    }
    .prompt { max-width: 520px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    details { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
    summary { cursor: pointer; font-weight: 700; }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #0f172a;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 6px;
      max-height: 420px;
      overflow: auto;
    }
    .two { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px; }
    @media (max-width: 900px) {
      header { position: static; }
      th { position: static; }
      .two { grid-template-columns: 1fr; }
      main { padding: 16px; }
    }
  </style>

    const fmtUsd = value => '$' + Number(value || 0).toFixed(3);
    const fmtSec = value => Number(value || 0).toFixed(1) + 's';
    const pct = value => (Number(value || 0) * 100).toFixed(1) + '%';

    function renderMetrics() {
      const items = [
        ['Average score', pct(data.aggregate.scores.averageScore)],
        ['Complete cases', data.aggregate.caseOutcomes.completedCases + ' / ' + data.aggregate.caseCount],
        ['Planner successes', data.aggregate.caseOutcomes.plannerSuccessCount + ' / ' + data.aggregate.caseCount],
        ['Aggregate cost', fmtUsd(data.aggregate.costs.totalEstimatedCostUsd)],
        ['Corrected cost', fmtUsd(data.correctedTotalCostUsd)],
        ['Wall clock', fmtSec(data.aggregate.runtime.totalWallClockMs / 1000)],
        ['Trips fed to planner', String(data.aggregate.corpus.historicalTripCount)],
        ['Inventory scanned', ((data.aggregate.search.flightInventoryScanned + data.aggregate.search.hotelInventoryScanned) / 1000000).toFixed(0) + 'M'],
      ];
      document.getElementById('metrics').innerHTML = items.map(([label, value]) =>
        '<div class="metric"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>'
      ).join('');
      document.getElementById('paths').textContent = 'Generated ' + data.generatedAt + ' | ' + data.outDir;
    }

    function renderQuality() {
      document.getElementById('qualityNotes').innerHTML =
        '<ul>' + data.profileQualityNotes.map(note => '<li>' + note + '</li>').join('') + '</ul>';
      const d = data.distribution;
      document.getElementById('distribution').innerHTML = [
        ['Avg cost/case', fmtUsd(d.costAverage)],
        ['Median cost/case', fmtUsd(d.costMedian)],
        ['P90 cost/case', fmtUsd(d.costP90)],
        ['Max cost/case', fmtUsd(d.costMax)],
        ['Avg runtime/case', fmtSec(d.runtimeAverageSeconds)],
        ['Median runtime/case', fmtSec(d.runtimeMedianSeconds)],
        ['P90 runtime/case', fmtSec(d.runtimeP90Seconds)],
        ['Zero-cost cases', String(d.zeroCostCases)],
        ['No-search cases', String(d.noSearchCases)],
      ].map(([label, value]) => '<div><b>' + label + ':</b> ' + value + '</div>').join('');
    }

    function renderProfiles() {
      document.getElementById('profiles').innerHTML = data.profiles.map(profile => {
        const qualityClass = profile.hasPreferences && profile.loyaltyProgramCount < 100 ? 'ok' : 'bad';
        const firstTrips = profile.firstTrips.map(trip =>
          '<tr><td class="mono">' + (trip.tripId || '') + '</td><td>' + (trip.type || '') + '</td><td>' +
          (trip.provider || '') + '</td><td>' + (trip.startDate || '') + ' to ' + (trip.endDate || '') +
          '</td><td class="mono">' + (trip.sourceEmailIds || []).join(', ') + '</td></tr>'
        ).join('');
        return '<details open><summary><span class="' + qualityClass + '">' + profile.userId + '</span> - ' +
          profile.tripCount + ' trips, ' + profile.loyaltyProgramCount + ' loyalty records, preferences=' +
          String(profile.hasPreferences) + '</summary>' +
          '<div class="grid" style="margin-top:10px">' +
          '<div><b>Filtered</b><br>' + profile.runStats.totalFiltered + ' / ' + profile.runStats.totalEmailIds + '</div>' +
          '<div><b>Raw trips extracted</b><br>' + profile.runStats.tripsExtracted + '</div>' +
          '<div><b>Dropped / flagged</b><br>' + profile.droppedTripCount + ' / ' + profile.flaggedTripCount + '</div>' +
          '<div><b>Errors</b><br>' + profile.runStats.errorCount + '</div>' +
          '<div><b>Subject filter cost</b><br>' + fmtUsd(profile.runStats.subjectFilterCostUsd) + '</div>' +
          '<div><b>Preferences</b><br>' + [profile.preferredCabinClass, profile.preferredSeatType].filter(Boolean).join(', ') + '</div>' +
          '</div>' +
          '<h3 style="margin-top:14px">Sample extracted trips</h3>' +
          '<div style="overflow:auto"><table><thead><tr><th>Trip id</th><th>Type</th><th>Provider</th><th>Dates</th><th>Source email ids</th></tr></thead><tbody>' +
          firstTrips + '</tbody></table></div>' +
          '<details><summary>Raw profile summary</summary><pre>' + JSON.stringify(profile, null, 2) + '</pre></details>' +
          '</details>';
      }).join('');
    }

    function filteredCases() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const status = document.getElementById('status').value;
      const sort = document.getElementById('sort').value;
      let rows = data.cases.filter(row => {
        const haystack = [row.caseId, row.prompt, row.tags.join(' ')].join(' ').toLowerCase();
        if (query && !haystack.includes(query)) return false;
        if (status === 'complete' && row.score !== 1) return false;
        if (status === 'partial' && !(row.score > 0.25 && row.score < 1)) return false;
        if (status === 'failed' && row.score > 0.25) return false;
        return true;
      });
      rows = [...rows].sort((a, b) => {
        if (sort === 'runtime_desc') return b.totalSeconds - a.totalSeconds;
        if (sort === 'cost_desc') return b.cost - a.cost;
        if (sort === 'score_asc') return a.score - b.score;
        if (sort === 'score_desc') return b.score - a.score;
        return a.caseId.localeCompare(b.caseId);
      });
      return rows;
    }

    function renderCases() {
      const rows = filteredCases();
      document.getElementById('caseCount').textContent = rows.length + ' visible cases';
      document.getElementById('caseRows').innerHTML = rows.map(row => {
        const scoreClass = row.score === 1 ? 'ok' : (row.score <= 0.25 ? 'bad' : 'warn');
        return '<tr data-case-id="' + row.caseId + '">' +
          '<td><button class="mono caseButton" data-case-id="' + row.caseId + '">' + row.caseId + '</button><br>' +
          row.tags.map(tag => '<span class="pill">' + tag + '</span>').join('') + '</td>' +
          '<td class="' + scoreClass + '"><b>' + row.scoreLabel + '</b><br>' +
          'P ' + row.scores.planningAccuracy + ' / S ' + row.scores.searchAccuracy + ' / V ' + row.scores.userValue + ' / C ' + row.scores.caseCompletion + '</td>' +
          '<td>' + (row.plannerSuccess ? '<span class="ok">success</span>' : '<span class="bad">failed</span>') +
          '<br><span class="mono">' + row.inputTokens.toLocaleString() + ' in</span></td>' +
          '<td>' + row.costLabel + '</td>' +
          '<td>' + fmtSec(row.totalSeconds) + '<br><span class="muted">plan ' + fmtSec(row.planningSeconds) + ', search ' + fmtSec(row.searchSeconds) + '</span></td>' +
          '<td>' + row.selectedFlightCount + ' flights, ' + row.selectedHotelCount + ' hotels<br><span class="muted">' +
          (row.destinationCity || 'no destination') + '</span></td>' +
          '<td class="prompt">' + row.prompt + '</td>' +
          '</tr>';
      }).join('');
      document.querySelectorAll('.caseButton').forEach(button => {
        button.addEventListener('click', () => renderCaseDetail(button.dataset.caseId));
      });
    }

    function renderCaseDetail(caseId) {
      const row = data.cases.find(item => item.caseId === caseId);
      if (!row) return;
      document.getElementById('caseDetail').innerHTML =
        '<details open><summary>Case detail: <span class="mono">' + row.caseId + '</span></summary>' +
        '<div class="grid" style="margin:10px 0">' +
        '<div><b>Score</b><br>' + row.scoreLabel + '</div>' +
        '<div><b>Cost</b><br>' + row.costLabel + '</div>' +
        '<div><b>Total runtime</b><br>' + fmtSec(row.totalSeconds) + '</div>' +
        '<div><b>Destination</b><br>' + (row.destinationCity || 'none') + '</div>' +
        '<div><b>Dates</b><br>' + (row.startDate || '?') + ' to ' + (row.endDate || '?') + '</div>' +
        '<div><b>Selected</b><br>' + row.selectedFlightCount + ' flights, ' + row.selectedHotelCount + ' hotels</div>' +
        '</div>' +
        '<h3>Prompt</h3><p>' + row.prompt + '</p>' +
        '<h3>Selected flights</h3><pre>' + JSON.stringify(row.selectedFlights, null, 2) + '</pre>' +
        '<h3>Selected hotels</h3><pre>' + JSON.stringify(row.selectedHotels, null, 2) + '</pre>' +
        '<h3>Case JSON</h3><pre>' + JSON.stringify(row, null, 2) + '</pre>' +
        '</details>';
      document.getElementById('caseDetail').scrollIntoView({behavior: 'smooth', block: 'start'});
    }

    document.getElementById('search').addEventListener('input', renderCases);
    document.getElementById('status').addEventListener('change', renderCases);
    document.getElementById('sort').addEventListener('change', renderCases);
    document.getElementById('reset').addEventListener('click', () => {
      document.getElementById('search').value = '';
      document.getElementById('status').value = 'all';
      document.getElementById('sort').value = 'runtime_desc';
      renderCases();
    });
    document.getElementById('expensiveFailures').addEventListener('click', () => {
      document.getElementById('search').value = '';
      document.getElementById('status').value = 'failed';
      document.getElementById('sort').value = 'cost_desc';
      renderCases();
    });

    renderMetrics();
    renderQuality();
    renderProfiles();
    renderCases();
  </script>
